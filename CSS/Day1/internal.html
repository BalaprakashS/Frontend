<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal CSS Example</title>

    <style>
        body {
            background-color: lightyellow;
        }

        h1 {
            color: purple;
            text-align: center;
            background-color: violet;
        }

        h2 {
            color: darkgreen;
            text-align: center;
            background-color: lightgreen;
        }

        h3 {
            color: brown;
            text-align: center;
            background-color: lightgray;
        }

        p {
            color: navy;
            font-size: 18px;
            text-align: center;
        }

        button {
            background-color: green;
            color: white;
            padding: 10px;
            display: block;
            margin: auto;
        }
    </style>
</head>
<body>

    <h1>Student Portal</h1>
    <h2>Online Learning System</h2>
    <h3>Access Courses and Materials</h3>

    <p>Internal CSS is written inside the style tag to style the webpage.</p>


</body>
</html>
