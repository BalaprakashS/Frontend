<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSS Example</title>
</head>
<body>

    <h1 style="color: white; background-color: blue; text-align: center; font-size: 32px;">
        Welcome to My Website
    </h1>

    <h2 style="color: yellow; background-color: green; text-align: center; font-size: 28px;">
        Learn HTML and CSS
    </h2>

    <h3 style="color: black; background-color: lightpink; text-align: center; font-size: 24px;">
        Build Amazing Webpages
    </h3>

    <p style="color: darkgreen; font-size: 18px; text-align: center;">
        Inline CSS is used to style individual HTML elements directly inside the HTML tags.
    </p>

</body>
</html>
