<!DOCTYPE html>
<html>

<head>
    <title>Avengers Super Hero Form</title>
</head>

<body>
    <section>
        <div>
            <center>
                <h1>Avengers Registration Form</h1>

                <form>
                    <label>Super Hero Name:</label>
                    <input type="text" placeholder="Enter hero name" required>
                    <br><br>

                    <label>Hero Email:</label>
                    <input type="email" placeholder="Enter email" required>
                    <br><br>

                    <label>Secret Password:</label>
                    <input type="password" placeholder="Enter password" required>
                    <br><br>

                    <label>Hero Age:</label>
                    <input type="number" min="18" max="60" placeholder="18 to 60 only" required>
                    <br><br>

                    <label>Join Date:</label>
                    <input type="date">
                    <br><br>

                    <label>Mission Time:</label>
                    <input type="time">
                    <br><br>

                    <label>Contact Number:</label>
                    <input type="tel" minlength="10" maxlength="10" placeholder="Enter 10-digit number" required>
                    <br><br>

                    <label>Enemy Name:</label>
                    <input type="text" placeholder="Enter enemy name">
                    <br><br>

                    <label>Choose Team:</label>
                    <input type="radio" name="team"> Avengers
                    <input type="radio" name="team"> Guardians
                    <input type="radio" name="team"> X-Men
                    <br><br>

                    <label>Super Powers:</label>
                    <input type="checkbox"> Flying
                    <input type="checkbox"> Strength
                    <input type="checkbox"> Speed
                    <br><br>

                    <label>Select Favorite Hero:</label>
                    <select>
                        <option>Iron Man</option>
                        <option>Thor</option>
                        <option>Hulk</option>
                        <option>Spider-Man</option>
                    </select>
                    <br><br>

                    <label>Mission Category:</label>
                    <select>
                        <option>Rescue Mission</option>
                        <option>Space Mission</option>
                        <option>Combat Mission</option>
                    </select>
                    <br><br>

                    <label>Mission Details:</label>
                    <textarea rows="5" cols="30" placeholder="Enter mission details"></textarea>
                    <br><br>

                    <label>Upload Hero Photo:</label>
                    <input type="file">
                    <br><br>

                    <label>Select Planet:</label>
                    <select>
                        <option>Earth</option>
                        <option>Asgard</option>
                        <option>Titan</option>
                    </select>
                    <br><br>

                    <button type="submit">Join Avengers</button>
                </form>
            </center>
        </div>
    </section>
</body>

</html>
