    <h2>Form</h2>
    <section>
        <div>
            <form>
                <label for=" ">Product Name:</label>
                <input type="text" placeholder="Enter Product Name"><br><br>
                <label for="">Category:</label>
                <select>
                    <option disabled selected>Select</option>
                    <option>Veg</option>
                    <option>Non-Veg</option>
                    <option>Beverages</option>
                    <option>Desserts</option>
                    <option>Snacks</option>

                <label for="">Price:</label>

                <label for="">Quantity:</label>

                <img src="../assets/images/Day7image/1.jpg"  width="400" height="200" alt=""><br><br>

                <label for="">Shipping ID:</label>

                <label for="">weight:</label>
                <input type="text" placeholder="Enter in KG"><br><br>
                <label for="">Product License:</label>

                <input type="radio" name="one" value="no">
                <label for="license2">No</label><br><br>
                <label>Approved List:</label>

                <input type="checkbox" value="fssai"> FSSAI<br><br>
                
            </form>
        </div>
