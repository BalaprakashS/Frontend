<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder Form</title>
</head>

<body>

    <center>
        <h1>Resume Builder Form</h1>
    </center>

    <form>
        <fieldset>
            <legend>Personal Details</legend>

            <label>Full Name:</label>
            <input type="text" placeholder="Enter full name" required><br><br>

            <label>Email:</label>
            <input type="email" placeholder="Enter email" required><br><br>

            <label>Phone Number:</label>
            <input type="tel" placeholder="Enter phone number"  minlength="10" maxlength="10"required><br><br>

            <label>Date of Birth:</label>
            <input type="date"><br><br>

            <label>Gender:</label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Other
        </fieldset>

        <br>

        <fieldset>
            <legend>Education Details</legend>

            <label>Degree:</label>
            <input type="text" placeholder="Enter degree"><br><br>

            <label>College Name:</label>
            <input type="text" placeholder="Enter college name"><br><br>

            <label>Year of Passing:</label>
            <input type="number" min="2000" max="2035"><br><br>

            <label>Percentage / CGPA:</label>
            <input type="text" placeholder="Enter marks" min="0" max="3" step="0.1">
        </fieldset>

        <br>

        <fieldset>
            <legend>Skills</legend>

            <label>Technical Skills:</label><br>
            <input type="checkbox"> HTML
            <input type="checkbox"> CSS
            <input type="checkbox"> JavaScript
            <input type="checkbox"> Python
            <input type="checkbox"> Java
            <input type="checkbox"> C
            <input type="checkbox"> C++
            <input type="checkbox"> SQL
            <input type="checkbox"> React
            <input type="checkbox"> Node.js
            <input type="checkbox"> Bootstrap
            <input type="checkbox"> Git
            <input type="checkbox"> GitHub
        </fieldset>

        <br>

        <fieldset>
            <legend>Experience</legend>

            <label>Company Name:</label>
            <input type="text" placeholder="Enter company name"><br><br>

            <label>Job Role:</label>
            <input type="text" placeholder="Enter job role"><br><br>

            <label>Years of Experience:</label>
            <input type="number" min="0" max="40"><br><br>

            <label>Job Description:</label><br>
            <textarea rows="5" cols="40" placeholder="Enter work experience details"></textarea>
        </fieldset>

        <br>

        <fieldset>
            <legend>Upload Resume Photo / Documents</legend>

            <label>Upload File:</label>
            <input type="file">
        </fieldset>

        <br>

        <center>
            <input type="submit" value="Submit Resume">
            <input type="reset" value="Clear Form">
        </center>

    </form>

</body>

</html>
